<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Profil Saya</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background-color: white;
            width: 300px;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .card img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
        }

        h2 {
            margin: 10px 0 5px;
        }

        p {
            color: gray;
            font-size: 14px;
        }

        .btn {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 20px;
            background-color: #6c63ff;
            color: white;
            border-radius: 20px;
            text-decoration: none;
        }
    </style>
</head>

<body>

    <div class="card">
        <!-- SESUAIKAN DENGAN FILE KAMU -->
        <img src="foto.jpeg" alt="Foto Profil">

        <!-- GANTI NAMA -->
        <h2>Rahma Fitri</h2>

        <!-- GANTI DESKRIPSI -->
        <p>Siswa MAN Kelas 10 E 7 | Calon Web Developer</p>

        <!-- TOMBOL -->
        <a href="#" class="btn">Hubungi Saya</a>
    </div>

</body>
</html>
